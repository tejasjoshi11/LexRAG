document_directories:
  acts: data/raw/acts
  judgments: data/raw/court_judgments
  pov: data/raw/pov
  tax: data/raw/tax

catalog_metadata: data/metadata/metadata.csv
registry_storage: artifacts/registry/registry.json

chunking:
  max_chunk_tokens: 448
  chunk_overlap_tokens: 64
  chunker_version: "v1"

pipeline:
  parser_version: "v1"
  cleaner_version: "v1"
  semantic_version: "v1"
  embedding_version: "v1"
  pipeline_version: "v1"

evaluation:
  golden_set_path: data/evaluation/golden_set.xlsx
  generated_answers_path: artifacts/evaluation/generated_answers.xlsx
  evaluation_results_path: artifacts/evaluation/evaluation_results.xlsx
  evaluation_summary_path: artifacts/evaluation/evaluation_summary.json

  provider: gemini
  model: gemini-3.5-flash
  top_k: 5
  
  judge_model: gemini-3.1-flash-lite
  faithfulness_threshold: 0.5

  checkpoint_interval: 10
  max_consecutive_failures: 3
  resume: true